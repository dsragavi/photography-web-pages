<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Photography Cart</title>
    <link rel="stylesheet" href="cart.css">
</head>
<body>

    <div class="container">
        <h1>🛒 Your Photo Cart</h1>
        <p>Your selected photos</p>

        <div class="cart-items">

            <div class="card">
                <img src="pet.webp" alt="Pet Photo">
                <h3>Pet Photo</h3>
                <p>₹200</p>
                <button>Remove</button>
            </div>

            <div class="card">
                <img src="flower.jpg" alt="Flower Photo">
                <h3>Flower Photo</h3>
                <p>₹150</p>
                <button>Remove</button>
            </div>

            <div class="card">
                <img src="land.jpg" alt="Landscape Photo">
                <h3>Landscape Photo</h3>
                <p>₹300</p>
                <button>Remove</button>
            </div>

        </div>

        <div class="total">
            <h2>Total: ₹650</h2>
            <button class="checkout">Checkout</button>
        </div>
    </div>

</body>
</html>
