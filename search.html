<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Photos</title>
    <link rel="stylesheet" href="search.css">
</head>
<body>

<div class="container">
    <h1>🔍 Search Photos</h1>
    <p>Start typing to see suggestions</p>

    <input type="text" list="photoList" placeholder="Search photos...">

    <datalist id="photoList">
        <option value="Animals">
        <option value="Architecture">
        <option value="Beach">
        <option value="Birds">
        <option value="Cars">
        <option value="City">
        <option value="Dogs">
        <option value="Flowers">
        <option value="Forest">
        <option value="Landscape">
        <option value="Mountains">
        <option value="Nature">
        <option value="Portrait">
        <option value="Sunset">
        <option value="Wildlife">
    </datalist>

</div>

</body>
</html>
